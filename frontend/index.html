<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>llm generator</title>

    <style>
        body {
            font-family: Arial;
            padding: 30px;
        }

        input {
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            margin-left: 10px;
            cursor: pointer;
        }

        pre {
            margin-top: 30px;

            background: #111;
            color: #00ff88;

            padding: 20px;

            overflow-x: auto;

            white-space: pre-wrap;
            word-wrap: break-word;

            border-radius: 10px;
        }
    </style>

</head>

<body>

    <h1>
        llms.txt Content Generator
    </h1>

    <input type="text" id="urlInput" placeholder="Enter Website URL" style="width: 400px;" />

    <button type="button" id="crawlBtn">
        Crawl Website
    </button>

    <button type="button" id="viewLLMS">
        View llms.txt
    </button>

    <pre id="result">
Waiting for crawl...
    </pre>

    <script>

        const resultBox =
            document.getElementById(
                "result"
            );

        document
            .getElementById("crawlBtn")
            .addEventListener(
                "click",
                async () => {

                    const url =
                        document
                            .getElementById(
                                "urlInput"
                            )
                            .value;

                    if (!url) {

                        resultBox.textContent =
                            "Please enter a URL.";

                        return;
                    }

                    resultBox.textContent =
                        "Crawling website...";

                    try {

                        const response =
                            await fetch(
                                "http://127.0.0.1:8000/crawl-site",
                                {
                                    method: "POST",

                                    headers: {
                                        "Content-Type":
                                            "application/json"
                                    },

                                    body: JSON.stringify({
                                        url: url
                                    })
                                }
                            );

                        const data =
                            await response.json();

                        resultBox.textContent =
                            JSON.stringify(
                                data,
                                null,
                                2
                            );

                    } catch (err) {

                        resultBox.textContent =
                            "Error: " + err.message;

                    }

                }
            );

        document
            .getElementById("viewLLMS")
            .addEventListener(
                "click",
                async () => {

                    resultBox.textContent =
                        "Loading llms.txt...";

                    try {

                        const response =
                            await fetch(
                                "http://127.0.0.1:8000/llms.txt"
                            );

                        const text =
                            await response.text();

                        resultBox.textContent =
                            text;

                    } catch (err) {

                        resultBox.textContent =
                            "Error: " + err.message;

                    }

                }
            );

    </script>

</body>

</html>
